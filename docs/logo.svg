<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
    <defs>
        <!-- Background Gradient -->
        <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#120C04" />
            <stop offset="100%" stop-color="#000000" />
        </linearGradient>

        <!-- Bevel Highlight Gradient -->
        <linearGradient id="bevelGrad" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#ffffff" stop-opacity="0.12" />
            <stop offset="100%" stop-color="#000000" stop-opacity="0.4" />
        </linearGradient>

        <!-- Accent Gradient -->
        <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#FFB300" />
            <stop offset="100%" stop-color="#FF6F00" />
        </linearGradient>

        <!-- Dynamic Glow Filter -->
        <filter id="neonGlow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="5" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
    </defs>

    <!-- Base Canvas / Rounded Keycap Plate -->
    <rect x="24" y="24" width="464" height="464" rx="124" fill="url(#bgGrad)" stroke="#FFB300" stroke-width="1.5" stroke-opacity="0.2" />

    <!-- Keyboard Keycap Bevel Effect -->
    <rect x="34" y="34" width="444" height="444" rx="114" fill="#211604" filter="url(#bevelGrad)" />

    <!-- Outer accent key line -->
    <rect x="46" y="46" width="420" height="420" rx="102" fill="none" stroke="url(#accentGrad)" stroke-width="1" stroke-opacity="0.3" />



    <!-- DuMD Monogram Glyph System -->
    <!-- Represents 'D', 'M', document layout, keyboard inputs, and speeds reading streams -->
    <g filter="url(#neonGlow)">
        <!-- Vertical structural column 'D' & Left spine of document -->
        <path d="M 160 144 L 160 368" stroke="url(#accentGrad)" stroke-width="24" stroke-linecap="round" />

        <!-- Outer D Loop -->
        <path d="M 160 144 H 240 C 304 144, 304 368, 240 368 H 160" fill="none" stroke="url(#accentGrad)" stroke-width="24" stroke-linecap="round" stroke-linejoin="round" />

        <!-- Fast Speed-reading stream line / Monogram M left diagonal -->
        <!-- Draws the 'M' valley overlapping the center of the 'D' loop -->
        <path d="M 230 184 L 272 320 L 320 200 L 352 320" fill="none" stroke="#FFB300" stroke-width="20" stroke-linecap="round" stroke-linejoin="round" />

        <!-- Vertical structural column 'M' right spine -->
        <path d="M 352 184 L 352 368" stroke="#FFB300" stroke-width="20" stroke-linecap="round" />

        <!-- Markdown Arrow (Embedded Downward Vector) -->
        <g stroke="url(#accentGrad)" stroke-width="16" stroke-linecap="round" stroke-linejoin="round">
            <!-- Central arrow shaft -->
            <line x1="288" y1="130" x2="288" y2="190" />
        </g>
    </g>

    <!-- Custom status indicators to simulate software rendering -->
    <circle cx="160" cy="416" r="4" fill="#FFB300" opacity="0.8" />
    <circle cx="352" cy="416" r="4" fill="#FFB300" opacity="0.4" />
</svg>
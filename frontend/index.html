<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DuMD</title>
    <link rel="icon" type="image/svg+xml" href="/src/assets/logo.svg" />
    <link rel="stylesheet" href="/src/style.css" />
</head>
  <body>
    <div id="progress-bar"></div>
    <article id="content">
        <p>Loading...</p>
    </article>
    <button id="settings-btn" aria-label="Settings">
      <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="3"/>
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
      </svg>
    </button>

    <div id="settings-popover">
      <div class="settings-section">
        <div class="settings-label">Theme</div>
        <div class="settings-row">
          <button class="theme-btn" data-theme="">
            <span class="theme-swatch" style="background:#ffffff;border:1px solid #d0d7de;"></span>
            Light
          </button>
          <button class="theme-btn" data-theme="theme-dark">
            <span class="theme-swatch" style="background:#0d1117;"></span>
            Dark
          </button>
          <button class="theme-btn" data-theme="theme-sepia">
            <span class="theme-swatch" style="background:#f4ecd8;"></span>
            Sepia
          </button>
        </div>
      </div>
      <div class="settings-section">
        <div class="settings-label">Zoom</div>
        <div class="settings-row">
          <button id="zoom-out-btn" aria-label="Zoom out">−</button>
          <span id="zoom-label">100%</span>
          <button id="zoom-in-btn" aria-label="Zoom in">+</button>
        </div>
      </div>
    </div>

    <script src="/src/main.js" type="module"></script>
</body>
</html>
